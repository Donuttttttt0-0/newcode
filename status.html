<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Status - Chill n Fill</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f6efe5; color: #5e3b24; }
    .status-badge { transition: all 0.3s ease; }
    /* สีตามที่น้องต้องการ */
    .bg-pending { background-color: #3abff8 !important; color: white; } /* สีฟ้า */
    .bg-cooking { background-color: #fbbd23 !important; color: white; } /* สีเหลือง */
    .bg-served { background-color: #36d399 !important; color: white; }  /* สีเขียว */
  </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">
  
  <div class="max-w-md w-full bg-[#fff7ee] rounded-3xl shadow-xl p-8 border border-[#7a4e2f]/20 mt-10">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-extrabold text-[#7a4e2f]">Track Your Order</h1>
      <p class="text-sm opacity-70">Order ID: #CNF-2026</p>
    </div>

    <div id="statusBox" class="status-badge bg-pending text-center py-4 rounded-2xl mb-8 font-bold text-xl shadow-md">
      PENDING
    </div>

    <div class="divider uppercase text-xs font-bold opacity-50">Order Details</div>
    
    <div id="orderItems" class="space-y-4 mb-6 max-h-60 overflow-y-auto">
      <p class="text-center opacity-50 italic">No items found.</p>
    </div>

    <div class="divider"></div>
    
    <div class="flex justify-between font-bold text-lg text-[#7a4e2f]">
      <span>Total</span>
      <span id="totalPrice">0 Bath</span>
    </div>
  </div>

  <div class="mt-10 p-4 bg-white/50 rounded-2xl border border-dashed border-[#7a4e2f]/30 text-center">
    <p class="text-xs font-bold mb-3 opacity-60">CHEF CONTROLS (SIMULATION)</p>
    <div class="flex gap-2">
      <button onclick="updateStatus('PENDING')" class="btn btn-sm btn-info text-white">Set Pending</button>
      <button onclick="updateStatus('COOKING')" class="btn btn-sm btn-warning text-white">Start Cooking</button>
      <button onclick="updateStatus('SERVED')" class="btn btn-sm btn-success text-white">Served</button>
    </div>
  </div>

  <script>
    // ฟังก์ชันเปลี่ยนสถานะและสี
    function updateStatus(status) {
      const box = document.getElementById('statusBox');
      box.innerText = status;
      
      // ลบสีเก่าออกให้หมด
      box.classList.remove('bg-pending', 'bg-cooking', 'bg-served');
      
      // ใส่สีใหม่ตามสถานะ
      if (status === 'PENDING') box.classList.add('bg-pending');
      if (status === 'COOKING') box.classList.add('bg-cooking');
      if (status === 'SERVED') box.classList.add('bg-served');
    }

    // ดึงข้อมูลจาก localStorage มาโชว์
    window.onload = function() {
      const data = localStorage.getItem('currentOrder');
      if (data) {
        const cart = JSON.parse(data);
        const container = document.getElementById('orderItems');
        let total = 0;

        container.innerHTML = cart.map(item => {
          total += (item.price * item.quantity);
          return `
            <div class="flex justify-between items-center text-sm">
              <div>
                <span class="font-bold">${item.name}</span>
                <span class="opacity-60 text-xs">x${item.quantity}</span>
              </div>
              <span class="font-mono">${item.price * item.quantity} THB</span>
            </div>
          `;
        }).join('');

        document.getElementById('totalPrice').innerText = total + " Bath";
      }
    };
  </script>
</body>
</html>
