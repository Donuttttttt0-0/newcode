<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Status - Chill n Fill</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f6efe5; color: #5e3b24; }
    .status-badge { transition: all 0.3s ease; }
    /* สีตามที่น้องต้องการ */
    .bg-pending { background-color: #3abff8 !important; color: white; } /* สีฟ้า */
    .bg-cooking { background-color: #fbbd23 !important; color: white; } /* สีเหลือง */
    .bg-served { background-color: #36d399 !important; color: white; }  /* สีเขียว */
  </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">
  
  <div class="max-w-md w-full bg-[#fff7ee] rounded-3xl shadow-xl p-8 border border-[#7a4e2f]/20 mt-10">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-extrabold text-[#7a4e2f]">Track Your Order</h1>
      <p class="text-sm opacity-70">Order ID: #CNF-2026</p>
    </div>

    <div id="statusBox" class="status-badge bg-pending text-center py-4 rounded-2xl mb-8 font-bold text-xl shadow-md">
      PENDING
    </div>

    <div class="divider uppercase text-xs font-bold opacity-50">Order Details</div>
    
    <div id="orderItems" class="space-y-4 mb-6 max-h-60 overflow-y-auto">
      <p class="text-center opacity-50 italic">No items found.</p>
    </div>

    <div class="divider"></div>
    
    <div class="flex justify-between font-bold text-lg text-[#7a4e2f]">
      <span>Total</span>
      <span id="totalPrice">0 Bath</span>
    </div>
  </div>

  <div class="mt-10 p-4 bg-white/50 rounded-2xl border border-dashed border-[#7a4e2f]/30 text-center">
    <p class="text-xs font-bold mb-3 opacity-60">CHEF CONTROLS (SIMULATION)</p>
    <div class="flex gap-2">
      <button onclick="updateStatus('PENDING')" class="btn btn-sm btn-info text-white">Set Pending</button>
      <button onclick="updateStatus('COOKING')" class="btn btn-sm btn-warning text-white">Start Cooking</button>
      <button onclick="updateStatus('SERVED')" class="btn btn-sm btn-success text-white">Served</button>
    </div>
  </div>

<script>
function renderOrders() {
    const orderListContainer = document.getElementById('orderList');
    const totalPriceElement = document.getElementById('totalPrice');
    
    // 1. ดึงข้อมูลที่ลูกค้าสั่งมาจากเครื่อง (localStorage)
    const savedOrder = localStorage.getItem('currentOrder');
    
    if (!savedOrder || JSON.parse(savedOrder).length === 0) {
        orderListContainer.classList.add('empty');
        orderListContainer.innerHTML = `
            <div class="empty-state">
                <p>No Orders yet</p>
                <span>Click the Button to Order</span>
            </div>`;
        totalPriceElement.innerText = "0 Bath";
        return;
    }

    const cart = JSON.parse(savedOrder);
    orderListContainer.classList.remove('empty');
    
    // 2. วาดรายการอาหาร พร้อม (สถานะ) ไว้ข้างหลั
    orderListContainer.innerHTML = cart.map(item => {
        const itemQty = item.quantity || item.qty || 1;
        
        
        const statusText = "Pending"; 

        return `
            <div class="order-card" style="display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.7); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; box-shadow: var(--shadow);">
                <div class="order-card-left" style="display: flex; align-items: center; gap: 14px;">
                    <img src="${item.img || 'img/food-placeholder.jpg'}" class="order-thumb" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover;">
                    <div>
                        <div class="order-name" style="font-weight: 700;">${item.name}</div>
                        <div class="order-price" style="color: var(--muted); font-size: 0.9rem;">${item.price} Bath x ${itemQty}</div>
                    </div>
                </div>
                
                <div class="order-status" style="display: flex; align-items: center;">
                    <span style="font-size: 0.85rem; font-weight: 700; color: #3abff8; background: rgba(58, 191, 248, 0.1); padding: 4px 12px; border-radius: 20px;">
                        (${statusText})
                    </span>
                </div>
            </div>
        `;
    }).join('');


    const total = cart.reduce((sum, item) => sum + (item.price * (item.quantity || item.qty || 1)), 0);
    totalPriceElement.innerText = `${total} Bath`;
}

// สั่งให้ทำงานทันทีที่เปิดหน้านี้ขึ้นมา
window.onload = renderOrders;
</script>
</body>
</html>
