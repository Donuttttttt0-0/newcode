<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Chill n Fill – Food Menu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f6efe5; font-family: system-ui, sans-serif; color: #5e3b24; padding: 20px 16px 40px; }
        :root { --chill-cream: #f6efe5; --chill-brown: #7a4e2f; --chill-brown-dark: #5e3b24; --chill-accent: #b07a53; --chill-border: #dcc9b4; }
        .container { max-width: 600px; margin: 0 auto; }
        .shop-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; padding-bottom: 8px; border-bottom: 2px solid var(--chill-border); }
        .shop-name { font-size: 1.7rem; font-weight: 700; color: var(--chill-brown-dark); }
        .shop-badge { font-size: 0.8rem; background: #efe3d2; padding: 4px 12px; border-radius: 40px; color: var(--chill-brown); font-weight: 500; }
        .category-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 8px 0 16px; margin-bottom: 12px; }
        .cat-btn { background: #fff7ee; border: 1px solid var(--chill-border); padding: 8px 20px; border-radius: 40px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; color: var(--chill-brown); cursor: pointer; }
        .cat-btn.active { background: var(--chill-brown); border-color: var(--chill-brown); color: white; }
        .menu-grid { display: flex; flex-direction: column; gap: 16px; }
        .menu-card { background: #fff7ee; border-radius: 28px; border: 1px solid var(--chill-border); padding: 16px 18px; box-shadow: 0 2px 6px rgba(0,0,0,0.02); }
        .menu-row { display: flex; justify-content: space-between; align-items: center; }
        .price { font-weight: 800; font-size: 1.3rem; color: var(--chill-brown); }
        .order-btn { background: var(--chill-brown); border: none; padding: 8px 20px; border-radius: 60px; color: white; font-weight: 600; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 247, 238, 0.96); border-top: 2px solid var(--chill-border); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .view-cart-btn { background: var(--chill-brown); padding: 8px 24px; border-radius: 60px; color: white; font-weight: bold; border: none; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
        .modal-card { background: #fff7ee; width: 90%; max-width: 500px; border-radius: 36px; padding: 24px 20px; max-height: 80vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--chill-border); }
        .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--chill-border); background: white; cursor: pointer; }
        .options-panel { margin-top: 10px; display: none; flex-direction: column; gap: 10px; padding: 10px; background: #fffaf5; border-radius: 15px; }
        .options-panel.show { display: flex; }
        .opt-choice { padding: 5px 12px; border: 1px solid var(--chill-border); border-radius: 20px; font-size: 0.75rem; cursor: pointer; margin-right: 5px; }
        .opt-choice.selected { background: var(--chill-accent); color: white; border-color: var(--chill-accent); }
    </style>
</head>
<body>
<div class="container">
    <div class="shop-header">
        <div class="shop-name">Chill n Fill</div>
        <div class="shop-badge">24h Delivery</div>
    </div>
    <div class="category-scroll" id="categoryBar">
        <button class="cat-btn active" data-cat="all">All</button>
        <button class="cat-btn" data-cat="Main Course">Main Course</button>
        <button class="cat-btn" data-cat="Soup">Soup</button>
        <button class="cat-btn" data-cat="Salad">Salad</button>
        <button class="cat-btn" data-cat="Drinks">Drinks</button>
    </div>
    <div id="menuGrid" class="menu-grid"></div>
    <div style="height: 80px;"></div>
</div>

<div class="cart-bar">
    <div>🛒 Cart: <span id="cartCount">0</span></div>
    <div id="cartTotalPrice" style="font-weight: 800;">0 THB</div>
    <button class="view-cart-btn" id="openCartModal">View Cart</button>
</div>

<div id="cartModal" class="modal">
    <div class="modal-card">
        <h2 style="margin-bottom: 15px;">Your Order</h2>
        <div id="cartItemsContainer"></div>
        <div style="text-align: right; font-weight: 800; padding: 15px 0; font-size: 1.2rem;">Total: <span id="modalTotalPrice">0</span> THB</div>
        <div style="display: flex; gap: 10px;">
            <button id="closeModalBtn" style="flex: 1; padding: 12px; border-radius: 40px; border: 1px solid #7a4e2f;">Close</button>
            <button id="fakeOrderBtn" style="flex: 2; padding: 12px; border-radius: 40px; background: #7a4e2f; color: white; border: none; font-weight: bold;">Place Order</button>
        </div>
    </div>
</div>

<script>
    const menuDatabase = [
        { id: 1, name: "Basil Stir-Fry", price: 65, category: "Main Course", desc: "Crispy chicken with basil and egg", hasOptions: true },
        { id: 2, name: "Tom Yum Goong", price: 120, category: "Soup", desc: "Spicy shrimp soup", hasOptions: true },
        { id: 3, name: "Pad Thai", price: 70, category: "Main Course", desc: "Thai noodles with shrimp", hasOptions: false },
        { id: 4, name: "Chicken Rice", price: 60, category: "Main Course", desc: "Steamed chicken with rice", hasOptions: false },
        { id: 5, name: "Som Tum", price: 55, category: "Salad", desc: "Spicy papaya salad", hasOptions: true },
        { id: 8, name: "Lime Juice", price: 25, category: "Drinks", desc: "Fresh lime juice", hasOptions: false }
    ];

    let cart = [];

    function updateCartUI() {
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        document.getElementById('cartCount').innerText = totalItems;
        document.getElementById('cartTotalPrice').innerText = totalPrice + " THB";
        const container = document.getElementById('cartItemsContainer');
        container.innerHTML = cart.length === 0 ? "Empty Cart" : cart.map(item => `
            <div class="cart-item">
                <div style="flex:2"><strong>${item.name}</strong><br><small>${item.optionsText}</small></div>
                <div style="flex:1; display:flex; gap:10px; align-items:center;">
                    <button class="qty-btn" onclick="changeQty('${item.cartId}', -1)">-</button>
                    <span>${item.quantity}</span>
                    <button class="qty-btn" onclick="changeQty('${item.cartId}', 1)">+</button>
                </div>
                <div style="flex:1; text-align:right;">${item.price * item.quantity}</div>
            </div>
        `).join('');
        document.getElementById('modalTotalPrice').innerText = totalPrice;
    }

    function changeQty(id, delta) {
        const item = cart.find(i => i.cartId === id);
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(i => i.cartId !== id);
            updateCartUI();
        }
    }

    function addToCart(menuItem, spicy = "Medium") {
        const optText = menuItem.hasOptions ? "Spiciness: " + spicy : "Standard";
        const cartId = `${menuItem.id}-${optText}`;
        const existing = cart.find(i => i.cartId === cartId);
        if (existing) existing.quantity += 1;
        else cart.push({ cartId, name: menuItem.name, price: menuItem.price, optionsText: optText, quantity: 1 });
        updateCartUI();
    }

    function showOptions(menuItem, card) {
        let panel = card.querySelector('.options-panel');
        if(!panel) {
            panel = document.createElement('div');
            panel.className = 'options-panel';
            panel.innerHTML = `
                <span style="font-size:0.8rem; font-weight:bold;">🌶️ Select Spicy Level</span>
                <div style="display:flex;">
                    <span class="opt-choice" data-v="Mild">Mild</span>
                    <span class="opt-choice selected" data-v="Medium">Medium</span>
                    <span class="opt-choice" data-v="Hot">Hot</span>
                </div>
                <button onclick="confirmAndAdd(${menuItem.id}, this)" style="background:#7a4e2f; color:white; border:none; padding:5px; border-radius:10px; margin-top:5px; cursor:pointer;">Add to Cart</button>
            `;
            card.appendChild(panel);
            panel.querySelectorAll('.opt-choice').forEach(btn => btn.onclick = () => {
                panel.querySelectorAll('.opt-choice').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        }
        panel.classList.toggle('show');
    }

    window.confirmAndAdd = (id, btn) => {
        const m = menuDatabase.find(x => x.id === id);
        const s = btn.parentElement.querySelector('.selected').dataset.v;
        addToCart(m, s);
        btn.parentElement.classList.remove('show');
    };

    function renderMenu(cat = "all") {
        const grid = document.getElementById('menuGrid');
        grid.innerHTML = "";
        const filtered = cat === "all" ? menuDatabase : menuDatabase.filter(m => m.category === cat);
        filtered.forEach(m => {
            const card = document.createElement('div');
            card.className = 'menu-card';
            card.innerHTML = `
                <div class="menu-row">
                    <div><h3>${m.name}</h3><small style="color:#b07a53;">${m.desc}</small></div>
                    <div class="price">${m.price}</div>
                    <button class="order-btn" onclick='handleOrderClick(${JSON.stringify(m)}, this)'>Order</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    window.handleOrderClick = (m, btn) => {
        if(m.hasOptions) showOptions(m, btn.closest('.menu-card'));
        else addToCart(m);
    };

    document.getElementById('openCartModal').onclick = () => document.getElementById('cartModal').style.display='flex';
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('cartModal').style.display='none';
    document.getElementById('fakeOrderBtn').onclick = () => {
        if(cart.length === 0) return alert("Please add items!");
        localStorage.setItem('currentOrder', JSON.stringify(cart));
        window.location.href = "status.html";
    };

    renderMenu();
</script>
</body>
</html>
