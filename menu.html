<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Chill n Fill – Food Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--chill-cream);
            font-family: system-ui, 'Segoe UI', 'Noto Sans Thai', 'Sukhumvit Set', 'Helvetica Neue', sans-serif;
            color: var(--chill-brown-dark);
            padding: 20px 16px 40px;
        }

        :root {
            --chill-cream: #f6efe5;
            --chill-cream-deep: #efe3d2;
            --chill-card: #fff7ee;
            --chill-brown: #7a4e2f;
            --chill-brown-dark: #5e3b24;
            --chill-accent: #b07a53;
            --chill-border: #dcc9b4;
            --chill-input: #fffaf5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--chill-border);
        }
        .shop-name {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--chill-brown-dark);
        }
        .shop-badge {
            font-size: 0.8rem;
            background: var(--chill-cream-deep);
            padding: 4px 12px;
            border-radius: 40px;
            color: var(--chill-brown);
            font-weight: 500;
        }

        .category-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 8px 0 16px;
            margin-bottom: 12px;
            scrollbar-width: thin;
        }
        .category-scroll::-webkit-scrollbar { height: 4px; background: var(--chill-border); border-radius: 10px; }
        .category-scroll::-webkit-scrollbar-thumb { background: var(--chill-accent); border-radius: 10px; }

        .cat-btn {
            background: var(--chill-card);
            border: 1px solid var(--chill-border);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            color: var(--chill-brown);
            cursor: pointer;
        }
        .cat-btn.active {
            background: var(--chill-brown);
            border-color: var(--chill-brown);
            color: white;
        }

        .menu-grid { display: flex; flex-direction: column; gap: 16px; margin-top: 6px; }
        .menu-card {
            background: var(--chill-card);
            border-radius: 28px;
            border: 1px solid var(--chill-border);
            padding: 16px 18px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .menu-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .menu-info h3 { font-size: 1.25rem; font-weight: 700; color: var(--chill-brown-dark); }
        .menu-desc { font-size: 0.75rem; color: var(--chill-accent); margin-top: 4px; }
        .price { font-weight: 800; font-size: 1.3rem; color: var(--chill-brown); }
        
        .order-btn {
            background: var(--chill-brown);
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* สำหรับปุ่ม +/- ในตะกร้า */
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn {
            width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--chill-border);
            background: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .options-panel { margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--chill-border); display: none; flex-direction: column; gap: 12px; }
        .options-panel.show { display: flex; }
        .opt-group { background: var(--chill-input); padding: 10px 12px; border-radius: 24px; }
        .opt-label { font-weight: 600; font-size: 0.85rem; margin-bottom: 8px; display: block; color: var(--chill-brown); }
        .opt-buttons { display: flex; flex-wrap: wrap; gap: 10px; }
        .opt-choice { background: white; border: 1px solid var(--chill-border); padding: 6px 14px; border-radius: 40px; font-size: 0.8rem; cursor: pointer; }
        .opt-choice.selected { background: var(--chill-accent); border-color: var(--chill-accent); color: white; }
        .confirm-options { background: var(--chill-cream-deep); border: none; padding: 10px; border-radius: 40px; font-weight: 600; cursor: pointer; }

        .cart-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 247, 238, 0.96); border-top: 2px solid var(--chill-border);
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .cart-total { font-size: 1.3rem; font-weight: 800; color: var(--chill-brown); }
        .view-cart-btn { background: var(--chill-brown); padding: 8px 24px; border-radius: 60px; color: white; font-weight: bold; border: none; cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
        .modal-card { background: var(--chill-card); width: 90%; max-width: 500px; border-radius: 36px; padding: 24px 20px; max-height: 80vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--chill-border); }
        
        .toast-msg { position: fixed; bottom: 90px; left: 20px; right: 20px; background: var(--chill-brown-dark); color: white; padding: 12px; border-radius: 60px; text-align: center; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 150; }
        .footer-space { height: 80px; }
    </style>
</head>
<body>
<div class="container">
    <div class="shop-header">
        <div class="shop-name">Chill n Fill</div>
        <div class="shop-badge">Delivery 24h</div>
    </div>

    <div class="category-scroll" id="categoryBar">
        <button class="cat-btn active" data-cat="all">All</button>
        <button class="cat-btn" data-cat="Single Dish">Single Dish</button>
        <button class="cat-btn" data-cat="Soup">Soup</button>
        <button class="cat-btn" data-cat="Salad">Salad</button>
        <button class="cat-btn" data-cat="Main">Main</button>
        <button class="cat-btn" data-cat="Drinks">Drinks</button>
    </div>

    <div id="menuGrid" class="menu-grid"></div>
    <div class="footer-space"></div>
</div>

<div class="cart-bar" id="cartBar">
    <div class="cart-info">🛒 Cart: <span id="cartCount">0</span> items</div>
    <div class="cart-total" id="cartTotalPrice">0 THB</div>
    <button class="view-cart-btn" id="openCartModal">View Cart</button>
</div>

<div id="cartModal" class="modal">
    <div class="modal-card">
        <div class="modal-header" style="display:flex; justify-content:space-between; font-size:1.5rem; font-weight:800; margin-bottom:15px;">
            <span>Your Order</span>
            <button id="closeModalBtn" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div id="cartItemsContainer"></div>
        <div style="text-align: right; font-weight: bold; padding: 15px 0; font-size:1.2rem;">
            Total: <span id="modalTotalPrice">0</span> THB
        </div>
        <div style="display: flex; gap: 12px;">
            <button id="clearCartBtn" style="background: #e0cfbe; border: none; padding: 12px; border-radius: 40px; flex:1; font-weight:bold;">Clear All</button>
            <button id="fakeOrderBtn" style="background: var(--chill-brown); color:white; border: none; padding: 12px; border-radius: 40px; flex:1; font-weight:bold;">Order Now</button>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-msg">Added to cart!</div>

<script>
    const menuDatabase = [
        { id: 1, name: "Basil Chicken", price: 65, category: "Single Dish", desc: "Crispy chicken with basil & fried egg", hasOptions: true },
        { id: 2, name: "Tom Yum Goong", price: 120, category: "Soup", desc: "Spicy and sour shrimp soup", hasOptions: true },
        { id: 3, name: "Pad Thai", price: 70, category: "Single Dish", desc: "Stir-fried noodles with shrimp", hasOptions: false },
        { id: 4, name: "Chicken Rice", price: 60, category: "Single Dish", desc: "Hainanese chicken rice", hasOptions: false },
        { id: 5, name: "Papaya Salad", price: 55, category: "Salad", desc: "Thai spicy papaya salad (Som Tum)", hasOptions: true },
        { id: 8, name: "Lime Juice", price: 25, category: "Drinks", desc: "Fresh lime juice", hasOptions: false },
        { id: 9, name: "Iced Green Tea", price: 30, category: "Drinks", desc: "Thai style iced green tea", hasOptions: false }
    ];

    let cart = [];

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 1500);
    }

    function changeQuantity(cartId, delta) {
        const item = cart.find(i => i.cartId === cartId);
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(i => i.cartId !== cartId);
            updateCartUI();
        }
    }

    function updateCartUI() {
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        document.getElementById('cartCount').innerText = totalItems;
        document.getElementById('cartTotalPrice').innerText = totalPrice + " THB";
        
        const container = document.getElementById('cartItemsContainer');
        if(cart.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px;">Your cart is empty</div>';
        } else {
            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div style="flex:2"><strong>${item.name}</strong><br><small style="color:#b07a53">${item.optionsText}</small></div>
                    <div class="qty-controls" style="flex:1; justify-content:center;">
                        <button class="qty-btn" onclick="changeQuantity('${item.cartId}', -1)">-</button>
                        <span>${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQuantity('${item.cartId}', 1)">+</button>
                    </div>
                    <div style="flex:1; text-align:right; font-weight:bold;">${item.price * item.quantity}</div>
                </div>
            `).join('');
        }
        document.getElementById('modalTotalPrice').innerText = totalPrice;
    }

    function addToCart(menuItem, options = null) {
        const optText = options ? `Spicy: ${options.spicy}` : "Standard";
        const cartId = `${menuItem.id}-${optText}`;
        const existing = cart.find(i => i.cartId === cartId);
        if (existing) existing.quantity += 1;
        else cart.push({ cartId, name: menuItem.name, price: menuItem.price, optionsText: optText, quantity: 1 });
        updateCartUI();
        showToast(`Added ${menuItem.name}!`);
    }

    function showOptions(menuItem, card) {
        document.querySelectorAll('.options-panel').forEach(p => p.classList.remove('show'));
        let panel = card.querySelector('.options-panel');
        if(!panel) {
            panel = document.createElement('div');
            panel.className = 'options-panel';
            panel.innerHTML = `
                <div class="opt-group"><span class="opt-label">🌶️ Spiciness</span>
                <div class="opt-buttons">
                    <span class="opt-choice" data-val="No Spicy">No</span>
                    <span class="opt-choice selected" data-val="Medium">Medium</span>
                    <span class="opt-choice" data-val="Hot">Hot</span>
                </div></div>
                <button class="confirm-options">Confirm + Add</button>`;
            card.appendChild(panel);
            panel.querySelectorAll('.opt-choice').forEach(b => b.onclick = () => {
                panel.querySelectorAll('.opt-choice').forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
            });
        }
        panel.classList.add('show');
        panel.querySelector('.confirm-options').onclick = () => {
            const spicy = panel.querySelector('.selected').dataset.val;
            addToCart(menuItem, { spicy });
            panel.classList.remove('show');
        };
    }

    function renderMenu(cat = "all") {
        const grid = document.getElementById('menuGrid');
        grid.innerHTML = "";
        const filtered = cat === "all" ? menuDatabase : menuDatabase.filter(m => m.category === cat);
        filtered.forEach(m => {
            const card = document.createElement('div');
            card.className = 'menu-card';
            card.innerHTML = `<div class="menu-row">
                <div class="menu-info"><h3>${m.name}</h3><div class="menu-desc">${m.desc}</div></div>
                <div class="price">${m.price}</div>
                <button class="order-btn">Order</button>
            </div>`;
            grid.appendChild(card);
            card.querySelector('.order-btn').onclick = () => m.hasOptions ? showOptions(m, card) : addToCart(m);
        });
    }

    document.getElementById('openCartModal').onclick = () => { document.getElementById('cartModal').style.display='flex'; updateCartUI(); };
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('cartModal').style.display='none';
    document.getElementById('clearCartBtn').onclick = () => { cart=[]; updateCartUI(); };
    document.querySelectorAll('.cat-btn').forEach(b => b.onclick = () => {
        document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        renderMenu(b.dataset.cat);
    });

    renderMenu();
</script>
</body>
</html>
