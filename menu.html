<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chill n Fill - Customer Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6efe5; --bg-soft: #efe3d2; --text: #5e3b24;
      --muted: #b07a53; --blue: #b07a53; --blue-strong: #7a4e2f;
      --border: rgba(122, 78, 47, 0.2); --card: #fff7ee;
    }
    body { font-family: "Sarabun", sans-serif; background: linear-gradient(135deg, var(--bg), var(--bg-soft)); color: var(--text); min-height: 100vh; }
    .topbar { height: 72px; background: var(--blue); display: flex; align-items: center; justify-content: space-between; padding: 0 26px; color: #fff7ee; }
    .content { flex: 1; padding: 26px 20px 180px; }
    .order-list { width: 100%; max-width: 1100px; min-height: 420px; border-radius: 18px; padding: 20px; background: rgba(255, 255, 255, 0.4); border: 1px solid var(--border); }
    .order-card { background: rgba(255, 255, 255, 0.7); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .order-thumb { width: 72px; height: 72px; border-radius: 12px; object-fit: cover; border: 1px solid var(--border); }
    .bottom-panel { position: fixed; left: 0; right: 0; bottom: 0; padding: 10px 12px 12px; background: rgba(246, 239, 229, 0.98); backdrop-filter: blur(10px); border-top: 1px solid var(--border); }
    .order-btn { width: 100%; height: 58px; border: none; border-radius: 14px; background: linear-gradient(180deg, var(--blue) 0%, var(--blue-strong) 100%); color: #fff7ee; font-size: 1.2rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .qty-btn { background: var(--bg-soft); color: var(--text); width: 34px; height: 34px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; }
    .menu-card { border: 1px solid var(--border); background: rgba(255, 255, 255, 0.7); border-radius: 16px; overflow: hidden; cursor: pointer; text-align: left; transition: 0.2s; }
    .menu-card:active { transform: scale(0.95); }
    .menu-card img { width: 100%; height: 140px; object-fit: cover; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="text-xl font-bold">Chill n Fill</div>
      <div class="bg-white/20 px-4 py-1 rounded-full font-bold">Table 1</div>
    </header>

    <main class="content">
      <div class="flex items-center gap-3 mb-6 justify-center">
        <span class="text-2xl">🍴</span>
        <h2 class="text-2xl font-extrabold text-[#7a4e2f]">Orders</h2>
      </div>

      <div id="cartDisplay" class="order-list flex flex-col items-center justify-center">
        <div class="text-center opacity-50">
          <p class="font-bold">No Order Yet</p>
          <span>Click the Button to order</span>
        </div>
      </div>
    </main>

    <footer class="bottom-panel">
      <div class="flex justify-between items-center mb-3 px-2">
        <span class="font-bold text-[#7a4e2f]">Details</span>
        <div class="text-right">
          <span class="text-sm opacity-60">Price</span>
          <span id="totalPriceDisplay" class="text-3xl font-black text-[#7a4e2f] block">0 Bath</span>
        </div>
      </div>
      <button id="actionBtn" class="order-btn" onclick="handleAction()">
        <span>Orders</span>
      </button>
    </footer>

    <dialog id="menuModal" class="modal">
      <div class="modal-box bg-[#f6efe5] border-2 border-[#7a4e2f]/20">
        <h3 class="font-black text-xl mb-4 text-[#7a4e2f]">Select Menu</h3>
        <div class="grid grid-cols-2 gap-4">
          <div class="menu-card" onclick="addToCart('Fried Chicken', 60, 'https://cdn-icons-png.flaticon.com/512/1865/1865961.png')">
            <img src="https://cdn-icons-png.flaticon.com/512/1865/1865961.png">
            <div class="p-3"><b>Fried Chicken</b><br><small>60 Bath</small></div>
          </div>
          <div class="menu-card" onclick="addToCart('Fried Rice', 40, 'https://cdn-icons-png.flaticon.com/512/3014/3014510.png')">
            <img src="https://cdn-icons-png.flaticon.com/512/3014/3014510.png">
            <div class="p-3"><b>Fried Rice</b><br><small>40 Bath</small></div>
          </div>
          <div class="menu-card" onclick="addToCart('Fried Egg', 15, 'https://cdn-icons-png.flaticon.com/512/837/837624.png')">
            <img src="https://cdn-icons-png.flaticon.com/512/837/837624.png">
            <div class="p-3"><b>Fried Egg</b><br><small>15 Bath</small></div>
          </div>
          <div class="menu-card" onclick="addToCart('Water', 10, 'https://cdn-icons-png.flaticon.com/512/3100/3100566.png')">
            <img src="https://cdn-icons-png.flaticon.com/512/3100/3100566.png">
            <div class="p-3"><b>Water</b><br><small>10 Bath</small></div>
          </div>
        </div>
        <div class="modal-action">
          <form method="dialog"><button class="btn">Close</button></form>
        </div>
      </div>
    </dialog>
  </div>

  <script>
    let cart = [];

    // ฟังก์ชันจัดการปุ่มหลัก
    function handleAction() {
      if (cart.length === 0) {
        document.getElementById('menuModal').showModal();
      } else {
        if(confirm("Confirm your order?")) {
          localStorage.setItem('currentOrder', JSON.stringify(cart));
          window.location.href = "status.html"; // เด้งไปหน้า Status
        }
      }
    }

    // เพิ่มของลงตะกร้า (ถ้าซ้ำให้เพิ่มจำนวน)
    function addToCart(name, price, img) {
      const existing = cart.find(item => item.name === name);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ name, price, img, qty: 1 });
      }
      document.getElementById('menuModal').close();
      renderCart();
    }

    // บวก-ลด จำนวนในตะกร้า
    function changeQty(name, delta) {
      const item = cart.find(i => i.name === name);
      if (item) {
        item.qty += delta;
        if (item.qty <= 0) cart = cart.filter(i => i.name !== name);
      }
      renderCart();
    }

    // วาดหน้าจอใหม่
    function renderCart() {
      const display = document.getElementById('cartDisplay');
      const totalDisplay = document.getElementById('totalPriceDisplay');
      const actionBtn = document.getElementById('actionBtn');

      if (cart.length === 0) {
        display.innerHTML = `<div class="text-center opacity-50"><p class="font-bold">No Order Yet</p><span>Click the Button to order</span></div>`;
        display.classList.add('justify-center');
        totalDisplay.innerText = "0 Bath";
        actionBtn.innerHTML = "<span>Orders</span>";
        return;
      }

      display.classList.remove('justify-center');
      display.innerHTML = cart.map(item => `
        <div class="order-card w-full">
          <div class="flex items-center gap-4">
            <img src="${item.img}" class="order-thumb">
            <div>
              <div class="order-name">${item.name}</div>
              <div class="order-price">${item.price} Bath</div>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <button class="qty-btn" onclick="changeQty('${item.name}', -1)">-</button>
            <span class="font-bold">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty('${item.name}', 1)">+</button>
          </div>
        </div>
      `).join('');

      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      totalDisplay.innerText = `${total} Bath`;
      actionBtn.innerHTML = "<span>Confirm Order</span>";
    }
  </script>
</body>
</html>
