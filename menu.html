<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chill n Fill</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6efe5; --bg-soft: #efe3d2; --text: #5e3b24;
      --muted: #b07a53; --blue: #b07a53; --blue-strong: #7a4e2f;
      --border: rgba(122, 78, 47, 0.2); --card: #fff7ee;
    }
    body { font-family: "Sarabun", sans-serif; background: linear-gradient(135deg, var(--bg), var(--bg-soft)); color: var(--text); min-height: 100vh; margin: 0; }
    .topbar { height: 72px; background: var(--blue); display: flex; align-items: center; justify-content: space-between; padding: 0 26px; color: #fff7ee; }
    .content { padding: 26px 20px 180px; display: flex; flex-direction: column; align-items: center; }
    .order-list { width: 100%; max-width: 1100px; min-height: 420px; border-radius: 18px; padding: 20px; background: rgba(255, 255, 255, 0.4); border: 1px solid var(--border); box-shadow: 0 12px 30px rgba(94, 59, 36, 0.18); }
    .order-card { background: rgba(255, 255, 255, 0.7); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .order-thumb { width: 72px; height: 72px; border-radius: 12px; object-fit: cover; border: 1px solid var(--border); }
    .bottom-panel { position: fixed; left: 0; right: 0; bottom: 0; padding: 10px 12px 12px; background: linear-gradient(to top, rgba(246, 239, 229, 0.98), rgba(239, 227, 210, 0.9)); backdrop-filter: blur(10px); border-top: 1px solid var(--border); }
    .order-btn { width: 100%; height: 58px; border: none; border-radius: 14px; background: linear-gradient(180deg, var(--blue) 0%, var(--blue-strong) 100%); color: #fff7ee; font-size: 1.2rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-btn { background: rgba(122, 78, 47, 0.08); color: var(--text); width: 34px; height: 34px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
    .menu-card { border: 1px solid var(--border); background: white; border-radius: 16px; overflow: hidden; cursor: pointer; }
    .menu-card img { width: 100%; height: 180px; object-fit: cover; }
    .modal-content { background: var(--card); border-radius: 20px; border: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="text-2xl font-extrabold">Chill n Fill</div>
      <div class="flex gap-3"><button class="bg-white/30 px-4 py-1 rounded-full font-bold">1</button></div>
    </header>

    <main class="content">
      <div class="flex items-center gap-3 mb-6">
        <span class="text-2xl">🍴</span>
        <h2 class="text-3xl font-extrabold text-[#7a4e2f]">Orders</h2>
      </div>

      <div id="cartDisplay" class="order-list flex flex-col items-center justify-center">
        <div class="text-center opacity-50">
          <p class="text-lg font-bold">No Order Yet</p>
          <span>Click the Button to order</span>
        </div>
      </div>
    </main>

    <footer class="bottom-panel">
      <div class="flex justify-between items-center mb-3 px-2">
        <span class="text-lg font-bold text-[#7a4e2f]">Details</span>
        <div class="text-right">
          <span class="text-sm opacity-60">Price</span>
          <span id="totalPriceDisplay" class="text-3xl font-black text-[#7a4e2f] block">0 Bath</span>
        </div>
      </div>
      <button id="actionBtn" class="order-btn" onclick="handleAction()">
        <span>Orders</span>
      </button>
    </footer>

    <dialog id="menuModal" class="modal">
      <div class="modal-box bg-[#f6efe5] max-w-3xl border-2 border-[#7a4e2f]/20">
        <div class="flex justify-between items-center mb-6">
          <h3 class="font-black text-2xl text-[#7a4e2f]">Menu</h3>
          <form method="dialog"><button class="text-2xl">✕</button></form>
        </div>
        <div class="grid grid-cols-2 gap-6">
          <div class="menu-card" onclick="addToCart('Fried Chicken', 60, 'img/chicken.jpg')">
            <img src="img/chicken.jpg">
            <div class="p-4"><b>Fried Chicken</b><br><small class="text-[#b07a53]">60 Bath</small></div>
          </div>
          <div class="menu-card" onclick="addToCart('Fried Rice', 40, 'img/rice.jpg')">
            <img src="img/rice.jpg">
            <div class="p-4"><b>Fried Rice</b><br><small class="text-[#b07a53]">40 Bath</small></div>
          </div>
          <div class="menu-card" onclick="addToCart('Fried Egg', 35, 'img/egg.jpg')">
            <img src="img/egg.jpg">
            <div class="p-4"><b>Fried Egg</b><br><small class="text-[#b07a53]">35 Bath</small></div>
          </div>
          <div class="menu-card" onclick="addToCart('Water', 10, 'img/water.jpg')">
            <img src="img/water.jpg">
            <div class="p-4"><b>Water</b><br><small class="text-[#b07a53]">10 Bath</small></div>
          </div>
        </div>
      </div>
    </dialog>
  </div>

  <script>
    let cart = [];

    function handleAction() {
      if (cart.length === 0) {
        document.getElementById('menuModal').showModal();
      } else {
        if(confirm("Do you want to place this order?")) {
          localStorage.setItem('currentOrder', JSON.stringify(cart));
          window.location.href = "status.html";
        }
      }
    }

    function addToCart(name, price, img) {
      const existing = cart.find(item => item.name === name);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ name, price, img, qty: 1 });
      }
      document.getElementById('menuModal').close();
      renderCart();
    }

    function changeQty(name, delta) {
      const item = cart.find(i => i.name === name);
      if (item) {
        item.qty += delta;
        if (item.qty <= 0) cart = cart.filter(i => i.name !== name);
      }
      renderCart();
    }

    function renderCart() {
      const display = document.getElementById('cartDisplay');
      const totalDisplay = document.getElementById('totalPriceDisplay');
      const actionBtn = document.getElementById('actionBtn');

      if (cart.length === 0) {
        display.innerHTML = `<div class="text-center opacity-50"><p class="text-lg font-bold">No Order Yet</p><span>Click the Button to order</span></div>`;
        display.classList.add('justify-center');
        totalDisplay.innerText = "0 Bath";
        actionBtn.innerHTML = "<span>Orders</span>";
        return;
      }

      display.classList.remove('justify-center');
      display.innerHTML = cart.map(item => `
        <div class="order-card w-full">
          <div class="flex items-center gap-4">
            <img src="${item.img}" class="order-thumb">
            <div>
              <div class="font-bold text-lg">${item.name}</div>
              <div class="text-[#b07a53] font-medium">${item.price} Bath</div>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <button class="qty-btn" onclick="changeQty('${item.name}', -1)">-</button>
            <span class="font-black text-xl w-6 text-center">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty('${item.name}', 1)">+</button>
          </div>
        </div>
      `).join('');

      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      totalDisplay.innerText = `${total} Bath`;
      actionBtn.innerHTML = "<span>Confirm Order</span>";
    }
  </script>
</body>
</html>
